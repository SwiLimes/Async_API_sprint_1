services:
  elasticsearch:
    image: elasticsearch:8.6.2
    container_name: functional-test-elasticsearch
    environment:
      node.name: elasticsearch
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - test-network

  redis:
    image: redis:7-alpine
    container_name: functional-test-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"
    networks:
      - test-network

  theatre-db:
    image: postgres:16
    container_name: functional-test-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: theatre
    ports:
      - "5432:5432"
    volumes:
      - ../../database_dump.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d theatre"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - test-network

  fastapi:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: fastapi-image
    container_name: functional-test-api
    working_dir: /app/src
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ELASTIC_HOST: elasticsearch
      ELASTIC_PORT: 9200
      POSTGRES_HOST: theatre-db
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: theatre
    ports:
      - "8000:8000"
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      theatre-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - test-network

  tests:
    image: fastapi-image
    container_name: functional-test-runner
    working_dir: /tests
    environment:
      REDIS_HOST: redis
      ELASTIC_HOST: elasticsearch
      ELASTIC_PORT: 9200
      SERVICE_URL: http://fastapi:8000
      PYTHONPATH: /tests
    depends_on:
      fastapi:
        condition: service_healthy
    entrypoint: >
      sh -c "pip install -r /tests/functional/requirements.txt
      && python3 /tests/functional/helpers/wait_for_es.py
      && python3 /tests/functional/helpers/wait_for_redis.py
      && python3 /tests/functional/helpers/wait_for_api.py
      && cd /tests/functional && pytest src -v"
    volumes:
      - ./:/tests/functional
    networks:
      - test-network

networks:
  test-network:
    driver: bridge